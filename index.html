<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #ff69b4;
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  #scoreboard {
    display: flex;
    gap: 60px;
    font-size: 42px;
    font-weight: bold;
    margin-bottom: 10px;
    letter-spacing: 4px;
    flex-shrink: 0;
  }
  canvas {
    display: block;
    touch-action: none;
  }
  #hint {
    margin-top: 10px;
    font-size: 11px;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="scoreboard">
  <span id="scoreLeft">0</span>
  <span id="scoreRight">0</span>
</div>
<canvas id="canvas"></canvas>
<div id="hint">Drag left side to move · Tap to start</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Responsive sizing ────────────────────────────────────────────────────────
let W, H;
function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight - 80; // leave room for scoreboard + hint
  // Maintain 16:10 landscape ratio
  if (maxW / maxH > 1.6) {
    H = maxH;
    W = Math.floor(H * 1.6);
  } else {
    W = maxW;
    H = Math.floor(W / 1.6);
  }
  canvas.width  = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ── Constants (proportional to canvas size) ──────────────────────────────────
const PADDLE_W  = () => Math.max(10, W * 0.016);
const PADDLE_H  = () => Math.max(50, H * 0.15);
const BALL_S    = () => Math.max(8,  W * 0.014);
const PAD_OFF   = () => W * 0.04;
const P_SPEED   = () => H * 0.012;
const AI_SPEED  = () => H * 0.009;
const WIN_SCORE = 7;

// ── State ────────────────────────────────────────────────────────────────────
let state  = 'start';
let winner = '';
let player = { x: 0, y: 0, score: 0 };
let ai     = { x: 0, y: 0, score: 0 };
let ball   = { x: 0, y: 0, vx: 0, vy: 0 };
let touchY = null; // raw touch Y on canvas

function initPositions() {
  player.x = PAD_OFF();
  ai.x     = W - PAD_OFF() - PADDLE_W();
  player.y = H / 2 - PADDLE_H() / 2;
  ai.y     = H / 2 - PADDLE_H() / 2;
}

function launchBall(towardsPlayer) {
  const speed = W * 0.007;
  const angle = (Math.random() * 60 - 30) * Math.PI / 180;
  ball.x  = W / 2;
  ball.y  = H / 2;
  ball.vx = (towardsPlayer ? -1 : 1) * speed * Math.cos(angle);
  ball.vy = speed * Math.sin(angle);
}

function resetBall(scoredSide) {
  ball.x = W / 2; ball.y = H / 2; ball.vx = 0; ball.vy = 0;
  setTimeout(() => launchBall(scoredSide === 'right'), 900);
}

function startGame() {
  player.score = 0;
  ai.score     = 0;
  document.getElementById('scoreLeft').textContent  = '0';
  document.getElementById('scoreRight').textContent = '0';
  initPositions();
  state = 'playing';
  launchBall(Math.random() < 0.5);
}

initPositions();

// ── Touch controls ────────────────────────────────────────────────────────────
function getTouchY(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleY = H / rect.height;
  for (let t of e.changedTouches) {
    // Only control paddle if touch is on the left half
    const tx = (t.clientX - rect.left) * (W / rect.width);
    if (tx < W / 2) {
      return (t.clientY - rect.top) * scaleY;
    }
  }
  return null;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'start' || state === 'won') { startGame(); return; }
  const y = getTouchY(e);
  if (y !== null) touchY = y;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const y = getTouchY(e);
  if (y !== null) touchY = y;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchY = null;
}, { passive: false });

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;

  const ph = PADDLE_H();
  const pw = PADDLE_W();
  const bs = BALL_S();

  // Player paddle follows touch
  if (touchY !== null) {
    const target = touchY - ph / 2;
    const diff   = target - player.y;
    player.y += diff * 0.25;
  }
  player.y = Math.max(0, Math.min(H - ph, player.y));

  // AI paddle
  const aiCenter  = ai.y + ph / 2;
  const aiDiff    = ball.y - aiCenter;
  const aiMove    = Math.min(Math.abs(aiDiff), AI_SPEED()) * Math.sign(aiDiff);
  ai.y += aiMove;
  ai.y = Math.max(0, Math.min(H - ph, ai.y));

  // Ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounce
  if (ball.y <= 0)      { ball.y = 0;      ball.vy *= -1; }
  if (ball.y + bs >= H) { ball.y = H - bs; ball.vy *= -1; }

  const maxSpeed = W * 0.018;

  // Player paddle hit
  if (
    ball.vx < 0 &&
    ball.x <= player.x + pw &&
    ball.x >= player.x &&
    ball.y + bs >= player.y &&
    ball.y <= player.y + ph
  ) {
    ball.x = player.x + pw;
    const hit   = (ball.y + bs / 2 - player.y) / ph;
    const angle = (hit - 0.5) * 120 * Math.PI / 180;
    const speed = Math.min(Math.hypot(ball.vx, ball.vy) * 1.04, maxSpeed);
    ball.vx =  speed * Math.cos(angle);
    ball.vy =  speed * Math.sin(angle);
  }

  // AI paddle hit
  if (
    ball.vx > 0 &&
    ball.x + bs >= ai.x &&
    ball.x + bs <= ai.x + pw + 2 &&
    ball.y + bs >= ai.y &&
    ball.y <= ai.y + ph
  ) {
    ball.x = ai.x - bs;
    const hit   = (ball.y + bs / 2 - ai.y) / ph;
    const angle = (hit - 0.5) * 120 * Math.PI / 180;
    const speed = Math.min(Math.hypot(ball.vx, ball.vy) * 1.04, maxSpeed);
    ball.vx = -speed * Math.cos(angle);
    ball.vy =  speed * Math.sin(angle);
  }

  // Score
  if (ball.x + bs < 0) {
    ai.score++;
    document.getElementById('scoreRight').textContent = ai.score;
    if (ai.score >= WIN_SCORE) { state = 'won'; winner = 'CPU'; return; }
    resetBall('left');
  }
  if (ball.x > W) {
    player.score++;
    document.getElementById('scoreLeft').textContent = player.score;
    if (player.score >= WIN_SCORE) { state = 'won'; winner = 'YOU'; return; }
    resetBall('right');
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  const ph = PADDLE_H();
  const pw = PADDLE_W();
  const bs = BALL_S();

  ctx.fillStyle = '#ff69b4';
  ctx.fillRect(0, 0, W, H);

  // Centre line
  ctx.setLineDash([10, 10]);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Player racket (handle left, head right)
  drawRacket(player.x, player.y, pw, ph, true);

  // AI racket (handle right, head left)
  drawRacket(ai.x, ai.y, pw, ph, false);

  // Tennis ball
  drawTennisBall(ball.x, ball.y, bs);

  // Labels
  ctx.fillStyle = '#2a2a2a';
  ctx.font = `${Math.max(10, W * 0.014)}px Courier New`;
  ctx.textAlign = 'left';
  ctx.fillText('YOU', PAD_OFF(), H - 10);
  ctx.textAlign = 'right';
  ctx.fillText('CPU', W - PAD_OFF(), H - 10);

  // Touch zone indicator (subtle)
  if (state === 'playing') {
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.fillRect(0, 0, W / 2, H);
  }

  // Overlays
  if (state === 'start')  drawOverlay('PONG', 'Tap to Start');
  if (state === 'won')    drawOverlay(winner === 'YOU' ? 'YOU WIN' : 'CPU WINS', 'Tap to Play Again');
}

function drawRacket(x, y, pw, ph, isPlayer) {
  const cx = x + pw / 2;
  const cy = y + ph / 2;
  const headRx = pw * 2.2;   // horizontal radius of oval head
  const headRy = ph * 0.46;  // vertical radius of oval head
  const handleLen = pw * 3.5;
  const handleW   = Math.max(3, pw * 0.45);
  const grip = pw * 1.2;     // darker grip portion

  // Handle
  const hx = isPlayer ? cx - headRx - handleLen : cx + headRx;
  ctx.save();
  // Shaft
  ctx.fillStyle = '#c8a96e';
  ctx.beginPath();
  ctx.rect(hx, cy - handleW / 2, handleLen, handleW);
  ctx.fill();
  // Grip wrap (darker end)
  ctx.fillStyle = '#7a5c2e';
  const gripX = isPlayer ? hx : hx + handleLen - grip;
  ctx.beginPath();
  ctx.rect(gripX, cy - handleW / 2, grip, handleW);
  ctx.fill();
  ctx.restore();

  // Racket head outline
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, headRx, headRy, 0, 0, Math.PI * 2);
  ctx.fillStyle = isPlayer ? 'rgba(255,255,255,0.08)' : 'rgba(229,80,80,0.08)';
  ctx.fill();
  ctx.strokeStyle = isPlayer ? '#ffffff' : '#e55';
  ctx.lineWidth = Math.max(2, pw * 0.3);
  ctx.stroke();

  // Strings (clipped to head)
  ctx.beginPath();
  ctx.ellipse(cx, cy, headRx - 1, headRy - 1, 0, 0, Math.PI * 2);
  ctx.clip();
  ctx.strokeStyle = isPlayer ? 'rgba(255,255,255,0.35)' : 'rgba(229,80,80,0.4)';
  ctx.lineWidth = 0.8;
  const hStep = headRy / 3.5;
  for (let dy = -headRy; dy <= headRy; dy += hStep) {
    ctx.beginPath();
    ctx.moveTo(cx - headRx, cy + dy);
    ctx.lineTo(cx + headRx, cy + dy);
    ctx.stroke();
  }
  const vStep = headRx / 3.5;
  for (let dx = -headRx; dx <= headRx; dx += vStep) {
    ctx.beginPath();
    ctx.moveTo(cx + dx, cy - headRy);
    ctx.lineTo(cx + dx, cy + headRy);
    ctx.stroke();
  }
  ctx.restore();
}

function drawTennisBall(x, y, size) {
  const r  = size * 0.9;
  const cx = x + size / 2;
  const cy = y + size / 2;

  // Fuzzy glow
  const glow = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
  glow.addColorStop(0,   '#e8f53a');
  glow.addColorStop(0.7, '#c5d400');
  glow.addColorStop(1,   '#9aaa00');
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Seam curves
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth = Math.max(1, r * 0.18);
  ctx.beginPath();
  ctx.arc(cx - r * 0.25, cy, r * 0.65, -Math.PI * 0.55, Math.PI * 0.55);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx + r * 0.25, cy, r * 0.65, Math.PI * 0.45, Math.PI * 1.55);
  ctx.stroke();
}

function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function drawOverlay(heading, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(28, W * 0.06)}px Courier New`;
  ctx.fillText(heading, W / 2, H / 2 - 16);
  ctx.font = `${Math.max(12, W * 0.022)}px Courier New`;
  ctx.fillStyle = '#777';
  ctx.fillText(sub, W / 2, H / 2 + 24);
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
